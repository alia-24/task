<!DOCTYPE html>
<html lang="ar">
<head>
    <title>CRUD</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="container">
        <h1> 
            <i class="fas fa-comment-dots"></i>
            إدارة التعليقات
            <i class="fas fa-pen-fancy"></i>  
        </h1>

        <div class="form-card">
            <div class="form-title">
                <i class="fas fa-plus-circle"></i>
                <span id="formTitle">إضافة تعليق جديد</span>
            </div>
            <form id="commentForm">
                <div class="form-group">
                    <label>
                        <i class="fas fa-user"></i>
                        الاسم
                    </label>
                    <input type="text" id="name" placeholder="أدخل اسمك الكامل">
                </div>
                <div class="form-group">
                    <label>
                        <i class="fas fa-envelope"></i>
                        البريد الإلكتروني
                    </label>
                    <input type="email" id="email" placeholder="example@domain.com">
                </div>
                <div class="form-group">
                    <label>
                        <i class="fas fa-comment"></i>
                        نص التعليق
                    </label>
                    <textarea id="body" placeholder="اكتب تعليقك هنا..."></textarea>
                </div>
                <div class="button-group">
                    <button type="submit" id="submitBtn">
                        <i class="fas fa-paper-plane"></i>
                        إضافة تعليق
                    </button>
                    <button type="button" class="cancel-btn" id="cancelBtn" style="display: none;">
                        <i class="fas fa-times"></i>
                        إلغاء
                    </button>
                </div>
            </form>
        </div>

        <div class="comments-list">
            <div class="comments-header">
                <i class="fas fa-list-ul"></i>
                جميع التعليقات
                <span class="badge" id="commentsCount">0</span>
            </div>
            <div id="commentsContainer">
                <div class="loading">
                    <div class="spinner"></div>
                    <p>جاري تحميل التعليقات...</p>
                </div>
            </div>
        </div>
    </div>
    <script src="main.js"></script>
</body>
</html>
